name: Build Android App (Signed apk)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Update Version and API
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/versionCode [0-9]*/versionCode 4/g' android/app/build.gradle
            sed -i 's/versionName "[^"]*"/versionName "1.0.4"/g' android/app/build.gradle
          fi

      - name: Build Android Release (apk)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Sign apk
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          # 👈 هذه الحقنة السحرية لتوجيه السيرفر لأدوات البناء الصحيحة
          BUILD_TOOLS_VERSION: "35.0.0"
      - name: Upload Signed apk
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
